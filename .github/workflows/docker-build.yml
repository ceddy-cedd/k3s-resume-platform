name: Build and Push RSS API Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      security-events: write
      id-token: write


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0


      - name: Install Crane
        run: |
          go install github.com/google/go-containerregistry/cmd/crane@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      

      - name: Set image tags
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_TAG=build-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG} .
          docker tag ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG} ghcr.io/${{ github.repository }}/rss-api:${BUILD_TAG}
          docker tag ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG} ghcr.io/${{ github.repository }}/rss-api:latest


      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/rss-api:build-${{ github.run_number }}
          artifact-name: rss-api-sbom.spdx.json
        
         
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/rss-api:build-${{ github.run_number }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 0


      - name: Run Trivy human-readable scan and fail on critical findings
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/${{ github.repository }}/rss-api:build-${{ github.run_number }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: 1
          skip-setup-trivy: true


      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif  


      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG}
          docker push ghcr.io/${{ github.repository }}/rss-api:${BUILD_TAG}
          docker push ghcr.io/${{ github.repository }}/rss-api:latest


      - name: Sign container image with Cosign
        env:
          COSIGN_YES: "true"
        run: |
          IMAGE_REPO="ghcr.io/${{ github.repository }}/rss-api"
          IMAGE_TAG="build-${{ github.run_number }}"
          DIGEST="$(crane digest ${IMAGE_REPO}:${IMAGE_TAG})"
          cosign sign "${IMAGE_REPO}@${DIGEST}"
