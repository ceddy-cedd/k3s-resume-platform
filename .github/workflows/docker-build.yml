name: Build and Push RSS API Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tags
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_TAG=build-${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG} .
          docker tag ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG} ghcr.io/${{ github.repository }}/rss-api:${BUILD_TAG}
          docker tag ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG} ghcr.io/${{ github.repository }}/rss-api:latest

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/rss-api:${IMAGE_TAG}
          docker push ghcr.io/${{ github.repository }}/rss-api:${BUILD_TAG}
          docker push ghcr.io/${{ github.repository }}/rss-api:latest
